plugins {
    id 'com.android.application'
}

android {
    namespace 'com.katalyst.stackarr'
    compileSdk 34

    defaultConfig {
        applicationId "com.katalyst.stackarr"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
