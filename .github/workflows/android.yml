name: Build Android APK

# Builds the configurable WebView APK. On a version tag it attaches the APK to
# the GitHub Release; on branch pushes / manual runs it uploads it as an artifact.
on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.2"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk stackarr.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: stackarr-apk
          path: stackarr.apk

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: stackarr.apk
