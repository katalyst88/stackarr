<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- a stack of books (the stacks) -->
  <g>
    <!-- bottom book -->
    <rect x="12" y="42" width="40" height="9" rx="2.5" fill="#d98c3f"/>
    <rect x="16" y="44.5" width="3" height="4" rx="1" fill="#0f172a" opacity="0.5"/>
    <!-- middle book, offset -->
    <rect x="15" y="31" width="38" height="9" rx="2.5" fill="#e0a96d"/>
    <rect x="46" y="33.5" width="3" height="4" rx="1" fill="#0f172a" opacity="0.5"/>
    <!-- top book -->
    <rect x="11" y="20" width="36" height="9" rx="2.5" fill="#f0b27a"/>
    <rect x="15" y="22.5" width="3" height="4" rx="1" fill="#0f172a" opacity="0.5"/>
    <!-- a bookmark ribbon on the top book -->
    <rect x="38" y="20" width="4" height="13" fill="#5eead4"/>
    <path d="M38 33 l2 -2.5 l2 2.5 z" fill="#0f172a"/>
  </g>
</svg>
