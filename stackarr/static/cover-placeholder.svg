<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="No cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d98c3f"/><stop offset="1" stop-color="#f0b27a"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg)"/>
  <!-- an open book -->
  <g transform="translate(150 150)">
    <g fill="none" stroke="#94a3b8" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
      <path d="M-78 -52 Q -40 -66 0 -52 L 0 56 Q -40 42 -78 56 Z" fill="#334155"/>
      <path d="M78 -52 Q 40 -66 0 -52 L 0 56 Q 40 42 78 56 Z" fill="#334155"/>
    </g>
    <!-- spine -->
    <rect x="-4" y="-58" width="8" height="120" rx="3" fill="url(#spine)"/>
    <!-- page lines -->
    <g stroke="#64748b" stroke-width="4" stroke-linecap="round" opacity="0.8">
      <path d="M-62 -34 H -16"/><path d="M-62 -16 H -16"/><path d="M-62 2 H -16"/><path d="M-62 20 H -28"/>
      <path d="M16 -34 H 62"/><path d="M16 -16 H 62"/><path d="M16 2 H 62"/><path d="M28 20 H 62"/>
    </g>
  </g>
  <text x="150" y="262" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="17" fill="#64748b">No cover</text>
</svg>
