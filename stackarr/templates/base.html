<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{ app_name }}</title>
<link rel="manifest" href="{{ url_for('main.manifest') }}">
<link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-180.png') }}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="{{ app_name }}">
<meta name="theme-color" content="#0b1120">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>:root { --accent: {{ accent }}; }</style>
</head>
<body>
<nav class="sidebar">
  <div class="brand"><img src="{{ url_for('static', filename='icon.svg') }}" alt=""><span>{{ app_name }}</span>
    <button class="nav-collapse" onclick="Stackarr.toggleNav()" title="Collapse menu" aria-label="Collapse menu">«</button></div>
  <a href="{{ url_for('main.home_page') }}" class="navlink {{ 'active' if request.path.endswith('/home') or request.path == url_base+'/' }}" title="Home">
    <svg viewBox="0 0 24 24"><path d="M12 3 2 12h3v8h5v-6h4v6h5v-8h3z"/></svg><span>Home</span></a>
  <a href="{{ url_for('main.suggestions_page') }}" class="navlink {{ 'active' if request.path.endswith('/suggestions') }}" title="Suggestions">
    <svg viewBox="0 0 24 24"><path d="M9 21h6v-2H9zm3-19a7 7 0 0 0-4 12.7V16a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-2.3A7 7 0 0 0 12 2zm-1 5h2v2h2v2h-2v2h-2v-2H9V9h2z"/></svg><span>Suggestions</span></a>
  <a href="{{ url_for('main.series_page') }}" class="navlink {{ 'active' if request.path.endswith('/series') }}" title="Up Next">
    <svg viewBox="0 0 24 24"><path d="M3 6h11v2H3zm0 5h11v2H3zm0 5h7v2H3zM16 7l6 4-6 4z"/></svg><span>Up Next</span></a>
  <a href="{{ url_for('main.requests_page') }}" class="navlink {{ 'active' if request.path.endswith('/requests') }}" title="Requests">
    <svg viewBox="0 0 24 24"><path d="M11 3h2v8h3l-4 4-4-4h3zM4 18h16v2H4z"/></svg><span>Requests</span></a>
  <a href="{{ url_for('main.discover_page') }}" class="navlink {{ 'active' if request.path.endswith('/discover') }}" title="Discover">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm4.2 5.8-2.3 5.9-5.9 2.3 2.3-5.9zM12 11a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/></svg><span>Discover</span></a>
  <a href="{{ url_for('main.history_page') }}" class="navlink {{ 'active' if request.path.endswith('/history') or request.path.endswith('/taste') }}" title="History &amp; ratings">
    <svg viewBox="0 0 24 24"><path d="M12 2.3l2.95 5.98 6.6.96-4.77 4.65 1.12 6.57L12 17.35l-5.9 3.1 1.12-6.57L2.45 9.24l6.6-.96z"/></svg><span>History</span></a>
  <a href="{{ url_for('main.insights_page') }}" class="navlink {{ 'active' if request.path.endswith('/insights') }}" title="Insights">
    <svg viewBox="0 0 24 24"><path d="M4 20V10h4v10zm6 0V4h4v16zm6 0v-7h4v7z"/></svg><span>Insights</span></a>
  <a href="{{ url_for('main.settings_page') }}" class="navlink {{ 'active' if request.path.endswith('/settings') }}">
    <svg viewBox="0 0 24 24"><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.6-2-3.4-2.4 1a7.6 7.6 0 0 0-1.7-1l-.4-2.6H10.8l-.4 2.6a7.6 7.6 0 0 0-1.7 1l-2.4-1-2 3.4L4.6 11a7.8 7.8 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7.6 7.6 0 0 0 1.7 1l.4 2.6h3.4l.4-2.6a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.4zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg><span>Settings</span></a>
  <form method="post" action="{{ url_for('main.logout') }}" class="logout-form">
    <button class="navlink logout" type="submit">
      <svg viewBox="0 0 24 24"><path d="M17 7l-1.4 1.4L18.2 11H8v2h10.2l-2.6 2.6L17 17l5-5zM4 5h8V3H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8v-2H4z"/></svg>
      <span>{{ user.username if user else 'Sign out' }}</span></button>
  </form>
  <div class="version-tag">v{{ version }} · {{ stage }}</div>
</nav>

<div class="shell">
  <header class="topbar">
    <form class="search" action="{{ url_for('main.discover_page') }}" method="get" role="search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 1 0-.7.7l.3.3v.8l5 5 1.5-1.5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <input name="q" id="topsearch" type="search" autocomplete="off" placeholder="Search {% if multi_format %}books{% elif show_ebook %}ebooks{% else %}audiobooks{% endif %} to add…" value="{{ request.args.get('q','') }}">
      <div class="search-suggest" id="search-suggest"></div>
    </form>
    <div class="topbar-spacer"></div>
    <button class="icon-btn" onclick="Stackarr.surprise()" title="Surprise me — one pick" aria-label="Surprise me">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill-rule="evenodd" d="M7 3h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V7a4 4 0 0 1 4-4Zm1 3.6a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Zm8 0a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Zm-4 4a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Zm-4 4a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Zm8 0a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Z"/></svg></button>
    <button class="icon-btn" onclick="Stackarr.toggleTheme()" title="Light / dark">◑</button>
  </header>
  <main>{% block content %}{% endblock %}</main>
</div>

<div id="toast"></div>
<script>window.URL_BASE="{{ url_base }}";</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
