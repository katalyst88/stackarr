<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{ app_name }}</title>
<link rel="manifest" href="{{ url_for('main.manifest') }}">
<link rel="icon" href="{{ url_for('static', filename='icon.svg') }}" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-180.png') }}">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="{{ app_name }}">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f172a">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>:root { --accent: {{ accent }}; }</style>
</head>
<body>
<nav class="sidebar">
  <div class="brand"><img src="{{ url_for('static', filename='icon.svg') }}" alt=""><span>{{ app_name }}</span></div>
  <div class="version-tag" title="{{ stage }}">v{{ version }} · {{ stage }}</div>
  <a href="{{ url_for('main.suggestions_page') }}" class="navlink {{ 'active' if request.path.endswith('/suggestions') }}">
    <svg viewBox="0 0 24 24"><path d="M12 2 3 7v10l9 5 9-5V7zm0 2.2 6.5 3.6L12 11.4 5.5 7.8zM5 9.3l6 3.3v6.8l-6-3.3zm14 0v6.8l-6 3.3v-6.8z"/></svg><span>Suggestions</span></a>
  <a href="{{ url_for('main.discover_page') }}" class="navlink {{ 'active' if request.path.endswith('/discover') }}">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm3.5 6.5-2 5-5 2 2-5z"/></svg><span>Discover</span></a>
  <a href="{{ url_for('main.requests_page') }}" class="navlink {{ 'active' if request.path.endswith('/requests') }}">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zm-1 13-3-2-3 2V4h6z"/></svg><span>Requests</span></a>
  <a href="{{ url_for('main.insights_page') }}" class="navlink {{ 'active' if request.path.endswith('/insights') }}">
    <svg viewBox="0 0 24 24"><path d="M4 20V10h4v10zm6 0V4h4v16zm6 0v-7h4v7z"/></svg><span>Insights</span></a>
  <a href="{{ url_for('main.settings_page') }}" class="navlink {{ 'active' if request.path.endswith('/settings') }}">
    <svg viewBox="0 0 24 24"><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.6-2-3.4-2.4 1a7.6 7.6 0 0 0-1.7-1l-.4-2.6H10.8l-.4 2.6a7.6 7.6 0 0 0-1.7 1l-2.4-1-2 3.4L4.6 11a7.8 7.8 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7.6 7.6 0 0 0 1.7 1l.4 2.6h3.4l.4-2.6a7.6 7.6 0 0 0 1.7-1l2.4 1 2-3.4zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg><span>Settings</span></a>
  <form method="post" action="{{ url_for('main.logout') }}" class="logout-form">
    <button class="navlink logout" type="submit">
      <svg viewBox="0 0 24 24"><path d="M17 7l-1.4 1.4L18.2 11H8v2h10.2l-2.6 2.6L17 17l5-5zM4 5h8V3H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h8v-2H4z"/></svg>
      <span>{{ user.username if user else 'Sign out' }}</span></button>
  </form>
</nav>
<main>{% block content %}{% endblock %}</main>
<div id="toast"></div>
<script>window.URL_BASE="{{ url_base }}";</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
